# Horizontal scaling: Nginx load balancer + 2 API replicas. DB and Redis shared.
# Use: docker compose -f docker-compose.scale.yml up -d
# Env: DEPLOY_IMAGE (or build from repo), DATABASE_URL, JWT_SECRET, REDIS_URL

version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "4000:80"
    volumes:
      - ./docker/nginx-scale.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api1
      - api2
    restart: unless-stopped

  api1:
    image: ${DEPLOY_IMAGE:-ghcr.io/placeholder/myshopuz-api:latest}
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=${REDIS_URL}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  api2:
    image: ${DEPLOY_IMAGE:-ghcr.io/placeholder/myshopuz-api:latest}
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=${REDIS_URL}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-myshopuz}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
