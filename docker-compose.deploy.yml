# Production deploy: API image from GHCR, DB and Redis on server.
# Use: docker compose -f docker-compose.deploy.yml pull && docker compose -f docker-compose.deploy.yml up -d
# Env: set DEPLOY_IMAGE in .env or export (e.g. ghcr.io/OWNER/myshopuz-api:latest)

version: '3.8'

services:
  api:
    image: ${DEPLOY_IMAGE:-ghcr.io/placeholder/myshopuz-api:latest}
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=${REDIS_URL}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-myshopuz}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
